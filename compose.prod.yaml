---
# Production environment override
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php-prod
    build:
      context: .
      target: frankenphp_prod
    environment:
      APP_SECRET: ${APP_SECRET}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
      
  messenger-worker:
    image: ${IMAGES_PREFIX:-}app-php-prod
    restart: unless-stopped
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=128M
    depends_on:
      - redis
      - database
    environment:
      APP_ENV: prod

  pgbackup:
    image: prodrigestivill/postgres-backup-local
    user: postgres:postgres
    volumes:
        - /var/opt/pgbackup:/backups
    links:
        - database
    depends_on:
        database:
          condition: service_healthy
    secrets:
      - backup_password
    environment:
        - POSTGRES_HOST=database
        - POSTGRES_DB=app
        - POSTGRES_USER=backup
        - POSTGRES_PASSWORD_FILE=/run/secrets/backup_password
        - POSTGRES_EXTRA_OPTS=-Z1 --schema=public --blobs
        - SCHEDULE=@daily
        - BACKUP_ON_START=TRUE
        - BACKUP_KEEP_DAYS=7
        - BACKUP_KEEP_WEEKS=4
        - BACKUP_KEEP_MONTHS=6
        - HEALTHCHECK_PORT=8080
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "find /backups -type f -name '*.sql.gz' -mmin -1500 | grep -q ."
        ]
      interval: 5m
      timeout: 10s
      retries: 3

###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

secrets:
  backup_password:
    file: ./secrets/backup_password
