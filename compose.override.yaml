---
# Development environment override
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php-dev
    restart: no
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      # Keep var/ off the bind-mount for faster I/O on Mac/Windows; comment to inspect from the host.
      - /app/var
      # If you develop on Mac or Windows you can remove the vendor/ directory
      #  from the bind-mount for better performance by enabling the next line:
      - /app/vendor
    environment:
      FRANKENPHP_WORKER_CONFIG: watch
      FRANKENPHP_SITE_CONFIG: hot_reload
      MERCURE_EXTRA_DIRECTIVES: demo
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-develop}"
      APP_ENV: "${APP_ENV:-dev}"
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###
  redis:
    restart: no
    ports:
      - "6379:6379"

###> doctrine/doctrine-bundle ###
  database:
    restart: no
    ports:
      - "5432:5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    restart: no
    ports:
      - "1025"
      - "8025:8025"
    environment:
      TZ: Europe/Paris
      # Accept any SMTP username and password, including none. Use this to basically allow anything.
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      # Typically either STARTTLS or TLS is enforced for all SMTP authentication.
      # This option allows insecure PLAIN & LOGIN SMTP authentication when using STARTTLS.
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      # Disable Mailpit’s automatic version checking.
      # When enabled, Mailpit will not contact GitHub to check for new releases.
      MP_DISABLE_VERSION_CHECK: 1
###< symfony/mailer ###
