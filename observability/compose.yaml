services:

  victorialogs:
    image: victoriametrics/victoria-logs:v1.51.0
    restart: no
    ports:
      - "9428:9428"
    volumes:
      - victorialogs:/victoria-logs-data
    command:
      - "-storageDataPath=/victoria-logs-data"
      - "-retentionPeriod=60d"   # Keep logs for 60 days
      - "-defaultMsgValue=empty" # Fallback so logs aren't dropped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.147.0
    restart: no
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=12"
      - "-httpListenAddr=:8428"
    volumes:
      - victoriametrics:/victoria-metrics-data
    
  vector:
    image: timberio/vector:0.57.0.custom.3d46266-distroless-libc
    restart: no
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker:/var/lib/docker:ro
      - ./observability/vector.yaml:/etc/vector/vector.yaml:ro
    depends_on:
      - victorialogs

  grafana:
    image: grafana/grafana-oss:13.0.2
    depends_on:
      - victorialogs
    restart: no
    ports:
      - "3000:3000"
    secrets:
      - grafana_password
    environment:
      GF_SECURITY_ADMIN_EMAIL: ${ADMIN_EMAIL}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
      GF_USERS_DEFAULT_THEME: system
      GF_USERS_ALLOW_SIGN_UP: false
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_ANALYTICS_CHECK_FOR_UPDATES: false
      GF_PLUGINS_PREINSTALL: victoriametrics-logs-datasource
    volumes:
      - grafana:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  victorialogs:
  victoriametrics:
  grafana:

secrets:
  grafana_password:
    file: ./secrets/grafana_password
